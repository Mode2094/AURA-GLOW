<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/logo.png">
    <title>תודה על ההזמנה - AURA GLOW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>body{font-family:'Cairo',sans-serif}</style>
</head>
<body class="bg-stone-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full bg-white rounded-3xl shadow-2xl border border-stone-200 p-8 md:p-12 text-center space-y-6">
        <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto">
            <svg class="w-10 h-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <h1 class="text-3xl font-extrabold text-stone-900">תודה על ההזמנה!</h1>
        <p class="text-stone-500 text-sm leading-relaxed">ההזמנה שלך התקבלה בהצלחה.<br>נטפל בה ונשלח אותה בהקדם.</p>
        <div class="bg-stone-50 rounded-2xl p-4 border border-stone-100 text-sm text-stone-600">
            <p>📦 <strong>נשלח אליך</strong></p>
            <p class="text-xs text-stone-400 mt-1">זמן אספקה משוער: 3-7 ימי עסקים</p>
        </div>
        <p class="text-xs text-stone-400">קיבלת אישור הזמנה למייל שלך</p>
        <div class="pt-2">
            <a href="/store/" class="inline-block bg-amber-700 hover:bg-amber-800 text-white px-8 py-3 rounded-full font-bold text-sm shadow-lg transition">חזור לחנות</a>
        </div>
    </div>
</body>
</html>
