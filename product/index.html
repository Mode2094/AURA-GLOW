        function getProductById(id) {
            for (var i = 0; i < DEFAULTS.length; i++) {
                if (String(DEFAULTS[i].id) === String(id)) return DEFAULTS[i];
            }
            return null;
        }

        function normalizeSlug(value) {
            var slug = String(value || '').trim();
            if (!slug) return '';
            for (var i = 0; i < 3; i++) {
                try {
                    var decoded = decodeURIComponent(slug);
                    if (decoded === slug) break;
                    slug = decoded;
                } catch (e) {
                    break;
                }
            }
            return slug.toLowerCase();
        }

        function buildSlug(value) {
            return normalizeSlug(String(value || '').toLowerCase().replace(/[^a-z0-9\u0590-\u05ff]+/g, '-').replace(/^-|-$/g, ''));
        }

        function loadProduct() {
            var params = new URLSearchParams(window.location.search);
            var id = params.get('id');
            var slug = params.get('slug');
            currentProduct = getProductById(id);

            if (!currentProduct && slug) {
                slug = normalizeSlug(slug);
                for (var i = 0; i < DEFAULTS.length; i++) {
                    var pSlug = buildSlug(DEFAULTS[i].name);
                    if (pSlug === slug || pSlug.indexOf(slug) >= 0 || slug.indexOf(pSlug) >= 0) { currentProduct = DEFAULTS[i]; break; }
                }
            }

            if (!currentProduct) {
                var pathParts = window.location.pathname.split('/').filter(Boolean);
                var slugFromPath = pathParts[pathParts.length - 1] || '';
                if (slugFromPath && slugFromPath !== 'product') {
                    slugFromPath = normalizeSlug(slugFromPath);
                    for (var i = 0; i < DEFAULTS.length; i++) {
                        var pSlug = buildSlug(DEFAULTS[i].name);
                        if (pSlug === slugFromPath || pSlug.indexOf(slugFromPath) >= 0) { currentProduct = DEFAULTS[i]; break; }
                    }
                }
            }

            if (!currentProduct) {
                document.getElementById('product-content').classList.add('hidden');
                document.getElementById('product-not-found').classList.remove('hidden');
                return;
            }

            document.getElementById('product-not-found').classList.add('hidden');
            document.getElementById('product-content').classList.remove('hidden');

            document.getElementById('product-image').src = currentProduct.image;
            document.getElementById('product-image').alt = currentProduct.name;
            document.getElementById('product-name').textContent = currentProduct.name;
            var discount = parseInt(localStorage.getItem('auraGlobalDiscount') || '60');
            document.getElementById('product-badge').textContent = currentProduct.badge || discount + '% הנחה';
            var discount = parseInt(localStorage.getItem('auraGlobalDiscount') || '60');
            var salePrice = currentProduct.oldPrice ? Math.round(currentProduct.oldPrice * (100 - discount) / 100) : currentProduct.price;
            document.getElementById('product-price').textContent = salePrice + '.00 ₪';
            document.getElementById('product-oldprice').textContent = currentProduct.oldPrice ? currentProduct.oldPrice + '.00 ₪' : '';
            document.getElementById('product-rating').textContent = currentProduct.rating || 4.5;
            document.getElementById('product-reviews').textContent = '(' + (currentProduct.reviews || 0) + ')';
            document.getElementById('product-category').textContent = currentProduct.category || '';
            document.title = currentProduct.name + ' - AURA GLOW';
            currentQty = 1;
            document.getElementById('qty-display').textContent = 1;

            var fpn = document.getElementById('float-product-name');
            var fp = document.getElementById('float-price');
            var fo = document.getElementById('float-oldprice');
            var fq = document.getElementById('float-qty');
            var discount = parseInt(localStorage.getItem('auraGlobalDiscount') || '60');
            var salePrice = currentProduct.oldPrice ? Math.round(currentProduct.oldPrice * (100 - discount) / 100) : currentProduct.price;
            if (fpn) fpn.textContent = currentProduct.name;
            if (fp) fp.textContent = salePrice + '.00 ₪';
            if (fo) fo.textContent = currentProduct.oldPrice ? currentProduct.oldPrice + '.00 ₪' : '';
            if (fq) fq.textContent = 1;

            // Canonical URL uses product id so links stay stable.
            var slug = currentProduct.name.toLowerCase().replace(/[^a-z0-9\u0590-\u05ff]+/g, '-').replace(/^-|-$/g, '');
            try { window.history.replaceState({}, '', '/product/?id=' + currentProduct.id + '&slug=' + encodeURIComponent(slug)); } catch(e) {}

            setTimeout(function() {
                var fb = document.getElementById('floating-bar');
                if (fb) { fb.classList.remove('hidden'); }
            }, 3000);
        }

        function changeQty(d) {
            currentQty = Math.max(1, Math.min(99, currentQty + d));
            document.getElementById('qty-display').textContent = currentQty;
            document.getElementById('float-qty').textContent = currentQty;
        }

        function doAddCart(redirect, btn) {
            if (!currentProduct) return;
            var cart = JSON.parse(localStorage.getItem('auraCart') || '[]');
            var found = false;
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === currentProduct.id) { cart[i].qty += currentQty; found = true; break; }
            }
            var discount = parseInt(localStorage.getItem('auraGlobalDiscount') || '60');
            var cartPrice = currentProduct.oldPrice ? Math.round(currentProduct.oldPrice * (100 - discount) / 100) : currentProduct.price;
            if (!found) cart.push({id:currentProduct.id,name:currentProduct.name,price:cartPrice,image:currentProduct.image,qty:currentQty});
            localStorage.setItem('auraCart', JSON.stringify(cart));
            document.getElementById('cart-badge').textContent = cart.reduce(function(s,i){return s+i.qty;},0);

            if (btn) {
                var orig = btn.innerHTML;
                btn.innerHTML = '✓';
                btn.classList.add('bg-emerald-600');
                btn.classList.remove('bg-stone-900','bg-amber-700');
                setTimeout(function() {
                    if (redirect) { window.location.href='/cart/'; return; }
                    btn.innerHTML = orig;
                    btn.classList.remove('bg-emerald-600');
                    btn.classList.add(redirect ? 'bg-amber-700' : 'bg-stone-900');
                }, 800);
            } else if (redirect) {
                window.location.href='/cart/';
            }
        }

        document.getElementById('btn-add-cart').addEventListener('click', function() { doAddCart(false, this); });
        document.getElementById('btn-buy-now').addEventListener('click', function() { doAddCart(true, this); });
        document.getElementById('float-add-cart').addEventListener('click', function() { doAddCart(false, this); });
        document.getElementById('float-buy-now').addEventListener('click', function() { doAddCart(true, this); });
        document.getElementById('close-floating').addEventListener('click', function() {
            document.getElementById('floating-bar').classList.add('hidden');
        });

                    var comments = ['מוצר מעולה! תוצאות מדהימות!','ממליצה בחום! העור שלי נראה מושלם','איכות מעולה, שירות מהיר!','פשוט מושלם! הזמנתי שוב','קיבלתי מחמאות על העור שלי!','סרום מעולה, מרגיש נפלא על הפנים','תוצאות מרשימות תוך זמן קצר','מחיר הוגן למוצר איכותי כל כך','החברה הכי טובה לעור שלי!','מטפל בעור בעדינות ומשאיר תחושה נעימה','לא יכולה בלעדיו! מומלץ ביותר','קניתי במתנה ואחותי התלהבה','מרגיש טבעי ונעים, ללא כימיקלים מיותרים','פשוט אהבה! כבר הזמנתי עוד מלאי','נספג מהר ומרגיש נהדר','העור שלי נעשה זוהר ובריא','התוצאות מדברות בעד עצמן!','מוצר ששווה כל שקל!','הזמנה שנייה שלי, פשוט מעולה','עור חלק וזוהר תוך שבוע','מרגיש כמו טיפול ספא בבית','מאוד מרוצה! אמליץ לכולם','תוצאה נראית תוך ימים ספורים','מוצר ששינה את העור שלי','אהבתי! ממשיכה לקנות שוב','מרגיש על העור במשך כל היום','אריזה יפה ומוצר מצוין','עור הפנים שלי נראה צעיר יותר','מומלץ בחום! קניתי כבר שלוש פעמים','נותן ברק טבעי וזוהר לעור'];
                    var count = 40 + Math.floor(Math.random() * 31);
                    var revs = [];
                    for (var i = 0; i < count; i++) {
                        var days = Math.floor(Math.random() * 60);
                        revs.push({id:Date.now()+i,name:names[Math.floor(Math.random()*names.length)],rating:parseFloat((3+Math.random()*2).toFixed(1)),comment:comments[Math.floor(Math.random()*comments.length)],time:days===0?'היום':'לפני '+days+' ימים'});
                    }
                    allReviews[pid] = revs;
                    try { localStorage.setItem('auraReviews', JSON.stringify(allReviews)); } catch(e) {}
                    revs.forEach(function(r) { saveReviewToSupabase(pid, r.name, r.rating, r.comment); });
                }
                renderReviews(pid);
            }).catch(function() {
                try { allReviews = JSON.parse(localStorage.getItem('auraReviews') || '{}'); } catch(e) { allReviews = {}; }
                renderReviews(pid);
            });
        }

        function renderReviews(pid) {
            var revs = allReviews[pid] || [];
            document.getElementById('reviews-count').textContent = '(' + revs.length + ' דירוג)';
            var c = document.getElementById('reviews-container');
            if (revs.length === 0) { c.innerHTML = '<div class="text-center py-8 text-stone-400 text-sm">אין ביקורות עדיין</div>'; return; }
            var html = '';
            for (var i = revs.length - 1; i >= 0; i--) {
                var r = revs[i];
                var stars = '';
                for (var s = 0; s < 5; s++) stars += s < Math.round(r.rating) ? '★' : '☆';
                html += '<div class="bg-stone-50 rounded-2xl p-4 border border-stone-100"><div class="flex items-center justify-between mb-2"><div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full bg-stone-300 text-white flex items-center justify-center text-sm font-bold">' + r.name.charAt(0) + '</div><div><div class="font-bold text-sm text-stone-800">' + r.name + '</div><div class="text-[10px] text-stone-400">' + (r.time||'היום') + '</div></div></div><div class="flex items-center gap-0.5 text-amber-500 text-sm">' + stars + '</div></div><p class="text-xs text-stone-600 leading-relaxed">' + r.comment + '</p></div>';
            }
            c.innerHTML = html;
        }

        loadProduct();
        initReviews();
        try { document.getElementById('cart-badge').textContent = JSON.parse(localStorage.getItem('auraCart')||'[]').reduce(function(s,i){return s+i.qty;},0); } catch(e) {}

        document.querySelectorAll('#star-rating .star').forEach(function(s) {
            s.addEventListener('click', function() {
                var val = parseInt(this.dataset.val);
                document.getElementById('review-rating').value = val;
                document.getElementById('selected-rating').textContent = val + ' / 5';
                document.querySelectorAll('#star-rating .star').forEach(function(el) {
                    el.className = 'star cursor-pointer ' + (parseInt(el.dataset.val) <= val ? 'text-amber-500' : 'text-stone-300') + ' transition';
                });
            });
        });

        document.getElementById('review-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var pid = currentProduct ? currentProduct.id : 0;
            var name = document.getElementById('review-name').value.trim();
            var rating = parseInt(document.getElementById('review-rating').value);
            var comment = document.getElementById('review-text').value.trim();
            if (!name || !rating || !comment) return;
            if (!allReviews[pid]) allReviews[pid] = [];
            var newReview = {id:Date.now(),name:name,rating:rating,comment:comment,time:'היום'};
            allReviews[pid].push(newReview);
            try { localStorage.setItem('auraReviews', JSON.stringify(allReviews)); } catch(e) {}
            saveReviewToSupabase(pid, name, rating, comment);
            renderReviews(pid);
            document.getElementById('review-form').reset();
            document.getElementById('review-rating').value = '0';
        });

        window.addEventListener('storage', function(e) {
            if (e.key === 'auraCart') {
                try { document.getElementById('cart-badge').textContent = JSON.parse(localStorage.getItem('auraCart')||'[]').reduce(function(s,i){return s+i.qty;},0); } catch(e) {}
            }
        });

        try { document.documentElement.classList.add('ready'); } catch(e) {}
